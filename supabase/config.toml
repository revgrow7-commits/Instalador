# Supabase Configuration
# Project: Instalador - Installation Management System

[api]
enabled = true
max_body_size = "20mb"
default_query_only = false

[db]
# Postgres configuration
port = 5432
shadow_port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
smtp_port = 54324
pop3_port = 54325
http_port = 54326

[auth]
enable_signup = true
enable_anonymous_signups = false
jwt_expiry = 3600
additional_jwt_claims = {}

[functions]
# Edge Functions port
port = 54327
verify_jwt = true
